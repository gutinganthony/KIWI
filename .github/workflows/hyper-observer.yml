name: Hyper Observer (read-only perp smart money tracker)
on:
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/hyper-observer/*.py'
      - 'projects/hyper-observer/requirements.txt'
      - '.github/workflows/hyper-observer.yml'
  workflow_dispatch:
  schedule:
    - cron: '45 22 * * *'   # 06:45 台北（錯開 poly 的 06:30）；只在 default branch 生效

jobs:
  observe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/hyper-observer/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/hyper-observer/requirements.txt

      - name: Fetch snapshot (fetch.py 內部防禦，端點失敗仍落 meta)
        working-directory: projects/hyper-observer
        run: python3 fetch.py --max-wallets 60

      - name: Classify smart money (existence check)
        working-directory: projects/hyper-observer
        run: python3 classify.py --snapshot "data/snapshots/$(date -u +%F)" || true

      # 深度追蹤（唯讀）：對 config.TRACKED_WALLETS 逐一產 dossier。
      # track_wallet 會把 tracked 錢包原始 snapshot 複製到 data/tracked/{addr}/latest_raw.json，
      # 故必須在 prune 之前執行；每支 || true 保底，永不擋住後續步驟。
      - name: Track wallets (deep tracking, read-only)
        working-directory: projects/hyper-observer
        run: |
          SNAP="data/snapshots/$(date -u +%F)"
          ADDRS=$(python3 -c "import config; print(' '.join(w['address'] for w in config.TRACKED_WALLETS))")
          for addr in $ADDRS; do
            python3 track_wallet.py --address "$addr" --snapshot "$SNAP" || true
          done

      # 廣域掃描（唯讀）：全量 leaderboard raw（fetch 已落 data/tmp/，工作區暫存、
      # .gitignore 不入版控）→ 可跟畫像過濾出候選 → 深抓候選到獨立 {date}-scan snapshot
      # → scan 報告。每步 || true 保底；raw 缺失（leaderboard 端點 403）則整段自動跳過。
      - name: Scan universe (followable-profile filter, offline)
        working-directory: projects/hyper-observer
        run: |
          TODAY=$(date -u +%F)
          if [ -f "data/tmp/leaderboard_raw_${TODAY}.json" ]; then
            python3 scan_universe.py --raw "data/tmp/leaderboard_raw_${TODAY}.json" \
              --out "data/scan/candidates_${TODAY}.json" || true
          else
            echo "leaderboard raw 不存在（端點失敗？），跳過掃描段"
          fi

      # 150 錢包 ≈ 600 請求；--sleep 0.75 依 fetch.py 內權重計算保留 ~26% rate-limit 餘裕
      - name: Fetch scan candidates (deep fetch, read-only)
        working-directory: projects/hyper-observer
        run: |
          TODAY=$(date -u +%F)
          if [ -f "data/scan/candidates_${TODAY}.json" ]; then
            python3 fetch.py --wallets-file "data/scan/candidates_${TODAY}.json" \
              --max-wallets 150 --sleep 0.75 --snapshot-suffix=-scan || true
          fi

      - name: Classify scan candidates (scan report)
        working-directory: projects/hyper-observer
        run: |
          TODAY=$(date -u +%F)
          if [ -d "data/snapshots/${TODAY}-scan" ]; then
            python3 classify.py --snapshot "data/snapshots/${TODAY}-scan" --label scan || true
          fi

      # repo 體積控制：原始 wallet 快照每日可觀，只保留衍生報告與 meta；
      # 原始資料隨時可由公開 info API 重抓，verification json 已含全部逐錢包指標。
      # tracked 錢包的原始資料已由上一步複製到 data/tracked/，不受此 prune 影響。
      # glob 同時涵蓋 {date} 與 {date}-scan 兩個 snapshot 目錄；data/tmp 的 36MB raw 一併清。
      - name: Prune raw wallet snapshots and tmp
        working-directory: projects/hyper-observer
        run: |
          rm -rf data/snapshots/*/wallets data/tmp
          echo "--- data size after prune（commit-back 前檢查，新增產物須 <1MB）---"
          du -sh data | tail -1
          du -sh data/* 2>/dev/null || true

      # paths 過濾已排除 data/**，不會自我觸發（commit 訊息刻意不含 skip-ci 方括號字樣，
      # poly-observer 曾因訊息含該字面被 GitHub 跳過觸發）。
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/hyper-observer/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: hyper-observer data update $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
