name: market-data

on:
  workflow_dispatch:
  schedule:
    # 台股收盤後（13:30 台北 = 05:30 UTC），平日 06:30 UTC 抓一次
    - cron: "30 6 * * 1-5"
  push:
    paths:
      - ".github/workflows/market-data.yml"
      - "personal/market-data/fetch.py"

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch market data
        run: python personal/market-data/fetch.py

      - name: Fetch JS-rendered data via headless browser
        run: |
          pip install -q playwright
          playwright install --with-deps chromium >/dev/null
          python personal/market-data/fetch_browser.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add personal/market-data/today.json personal/market-data/history.jsonl
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "data: market snapshot $(date -u +%F)"
            git push
          fi
