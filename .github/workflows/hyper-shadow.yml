name: Hyper Shadow (read-only Hyperliquid depth probe)
# Hyperliquid 影子實測：候選錢包主戰場（HIP-3 builder 永續市場，如 xyz:META、@166）的
# 訂單簿深度剖面（主角）＋班內新成交的偵測延遲/進場劣化（配菜）。
# 純唯讀：hyper_shadow.py 只 POST 公開 info API 的查詢 type（l2Book/userFills/
# clearinghouseState/allMids 白名單），不下單、不簽章、無私鑰、不碰 exchange endpoint。
on:
  workflow_dispatch:
    inputs:
      duration_min:
        description: 'Session 長度（分鐘）'
        required: false
        default: '30'
      address:
        description: '目標錢包（留空＝config 中 label 含 scan-best-candidate 者）'
        required: false
        default: ''
  schedule:
    # 三班八小時等距（UTC）；永續 24/7 無休市。只在 default branch 生效
    - cron: '30 2 * * *'
    - cron: '30 10 * * *'
    - cron: '30 18 * * *'
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/hyper-observer/hyper_shadow.py'
      - '.github/workflows/hyper-shadow.yml'

# 同 group 排隊不並行：三班互不重疊，但防 push 觸發與 schedule 撞車
concurrency:
  group: hyper-shadow
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/hyper-observer/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/hyper-observer/requirements.txt

      # push 觸發＝首跑驗證，只跑 10 分鐘；schedule/dispatch 預設 30 分鐘
      - name: Run hyper shadow (read-only, exit 0 by design)
        working-directory: projects/hyper-observer
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_DURATION: ${{ github.event.inputs.duration_min }}
          IN_ADDRESS: ${{ github.event.inputs.address }}
        run: |
          DURATION="$IN_DURATION"
          if [ "$EVENT_NAME" = "push" ]; then DURATION=10; fi
          if [ -z "$DURATION" ]; then DURATION=30; fi
          if [ -n "$IN_ADDRESS" ]; then
            python3 hyper_shadow.py --duration-min "$DURATION" --address "$IN_ADDRESS"
          else
            python3 hyper_shadow.py --duration-min "$DURATION"
          fi

      # 產物體積哨兵：深度剖面×2＋低頻 fills 的 JSONL/summary 遠低於 1MB 上限
      - name: Report shadow data size
        run: du -sh projects/hyper-observer/data/shadow || true

      # push paths 過濾不含 data/**，不會自我觸發；訊息刻意不含 skip-ci 方括號字面
      # （2026-07-10 教訓）。本 repo 已有多支 workflow 同分支競態前科 → push 前先
      # pull --rebase 遠端同名分支，避免非 fast-forward 被拒。
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/hyper-observer/data/shadow/
          if git diff --cached --quiet; then
            echo "No shadow data to commit."
          else
            git commit -m "auto: hyper-shadow session $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
