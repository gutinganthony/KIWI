name: Generate 5-Year History (One-Time)

on:
  workflow_dispatch:
    inputs:
      days:
        description: '回填天數（預設1825=5年）'
        required: false
        default: '1825'

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Generate history data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        working-directory: projects/avi-v5
        run: python scripts/generate_history.py --days ${{ github.event.inputs.days || 1825 }}

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/history.json docs/index.html
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "feat: 生成過去5年 AVI/CRI/TSI 歷史走勢數據"
            git push
          fi
