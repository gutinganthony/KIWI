name: Daily Market Alert

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 週一到週五，台灣時間 08:30 (UTC 00:30)，dashboard 更新後 30 分鐘發送
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Send daily alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python projects/avi-v5/scripts/notify.py

      # 每日預警本身失敗時（如 dashboard 資料缺、通道故障）補一則 ops 推播。
      # 注意：若是通道整個掛掉，這則也可能發不出去，但常見情況是單一通道故障，值得一試。
      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python3 projects/avi-v5/scripts/notify_ops.py \
            --title "❌ KIWI 每日預警發送失敗" \
            --body "notify.py 執行失敗，今天的市場體溫可能沒發出去。查 log。" \
            --url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" || true
