name: Daily Market Alert

on:
  schedule:
    - cron: '30 0 * * 1-5'  # 週一到週五，台灣時間 08:30 (UTC 00:30)
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Send daily alert
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        working-directory: projects/avi-v5
        run: python scripts/notify.py
