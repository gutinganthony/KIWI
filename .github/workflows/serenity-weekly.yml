name: Serenity Weekly Screen

# 節奏：每週六「輕量」（重定價+觸發/否證+催化劑）；每月第一個週六「全掃」（多做四市場新標的獵殺）。
# workflow_dispatch 手動觸發 = 全掃（方便測試）。
# 需要 repo secret: ANTHROPIC_API_KEY

on:
  schedule:
    # 週六 02:13 UTC = 10:13 台灣時間
    - cron: '13 2 * * 6'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  serenity-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      # 決定本次是「全掃」還是「輕量」：月初第一個週六(當月 1–7 日) 或 手動觸發 = 全掃
      - id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FULL=true
          else
            DOM=$((10#$(date -u +%d)))
            if [ "$DOM" -le 7 ]; then FULL=true; else FULL=false; fi
          fi
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "本次模式：full=$FULL（UTC 日=$(date -u +%d)）"

      # ── 全掃（每月第一個週六 / 手動）──
      - name: Serenity 全掃（月度）
        if: steps.mode.outputs.full == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --max-turns 120
            --allowedTools WebSearch,WebFetch,Read,Write,Edit,MultiEdit,Glob,Grep,Bash
          prompt: |
            依 skills/serenity/weekly-screen.md 執行完整 Serenity 週報（全掃模式）。
            1. 讀 skills/serenity/SKILL.md 與 skills/serenity/watchlist.md
            2. 用 WebSearch 重拉全 watchlist 每一檔的 LIVE 現價/市值/forward P/E，
               計算 vs 上週變化，標記一週 >15% 的移動（注意日圓億/兆、台幣億單位陷阱）
            3. 逐檔比對觸發價與否證條件，標記 🟢買進命中 / 🔴賣出否證命中；過 <$2B 者確認是否漲出框
            4. 掃未來 2 週催化劑（財報/有報/指數/政策/IPO）
            5. 四市場（US/日/台/韓）輕掃新的 <$2B 卡口候選，flag 待深掘
            6. Phase 6 宏觀前提監控（AI capex 下修、JPY、記憶體過剩訊號、CXMT 實體清單）
            7. 寫 dated digest 到 topics/business/serenity-weekly/YYYY-MM-DD.md（標【月度全掃】）；
               更新 docs/serenity/data.json（每檔 price/wk 填今天重拉值、headline 更新）；
               更新 skills/serenity/watchlist.md 價格快照；在 INDEX.md 加連結
            8. 用 git 把變更 commit 並 push 到 main（觸發 Pages 重新部署）
            來源三級標示（已確認/[推論]/[推測]）、非投資建議。

      # ── 輕量（其餘每週六）──
      - name: Serenity 輕量（週度）
        if: steps.mode.outputs.full == 'false'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --max-turns 60
            --allowedTools WebSearch,WebFetch,Read,Write,Edit,MultiEdit,Glob,Grep,Bash
          prompt: |
            依 skills/serenity/weekly-screen.md 執行 Serenity 週報【輕量模式】。
            1. 讀 skills/serenity/SKILL.md 與 skills/serenity/watchlist.md
            2. 用 WebSearch 重拉全 watchlist 每一檔的 LIVE 現價/市值/forward P/E，
               計算 vs 上週變化，標記一週 >15% 的移動（注意日圓億/兆、台幣億單位陷阱）
            3. 逐檔比對觸發價與否證條件，標記 🟢買進命中 / 🔴賣出否證命中；過 <$2B 者確認是否漲出框
            4. 掃未來 2 週催化劑（財報/有報/指數/政策/IPO）
            5. Phase 6 宏觀前提監控（AI capex 下修、JPY、記憶體過剩訊號、CXMT 實體清單）
            6. 更新 docs/serenity/data.json（每檔 price/wk 填今天重拉值、headline 更新）；
               更新 skills/serenity/watchlist.md 價格快照；寫精簡 digest 到
               topics/business/serenity-weekly/YYYY-MM-DD.md（標【週度輕量】）；在 INDEX.md 加連結
            7. 用 git 把變更 commit 並 push 到 main（觸發 Pages 重新部署）
            【輕量模式跳過】四市場新標的獵殺（保留給每月全掃）。
            來源三級標示、非投資建議。
