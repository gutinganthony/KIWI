name: US Funnel (Form 4 insider-cluster daily scan, read-only)
on:
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/us-funnel/*.py'
      - 'projects/us-funnel/requirements.txt'
      - '.github/workflows/us-funnel.yml'
  workflow_dispatch:
  schedule:
    # UTC 03:30 = 美東前一交易日 22:00 收件截止之後（EDT 02:00/EST 03:00 UTC）、台北 11:30。
    # 週二至週六對應美股週一至週五申報日；只在 default branch 生效。
    - cron: '30 3 * * 2-6'

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/us-funnel/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/us-funnel/requirements.txt

      # fetch_edgar 內部防禦（端點失敗仍落 meta、exit 0）；|| true 雙保底。
      # EDGAR 禮儀（UA 含聯絡 email、≤10 req/s）在 config.py / fetch_edgar.py 內落實。
      - name: Fetch EDGAR Form 4 daily filings
        working-directory: projects/us-funnel
        run: python3 fetch_edgar.py || true

      - name: Run funnel (資格 → 否決 → 等權評分)
        working-directory: projects/us-funnel
        run: python3 funnel.py || true

      - name: Track forward performance (窗口報酬回填)
        working-directory: projects/us-funnel
        run: python3 track_performance.py || true

      # repo 體積哨兵：事件檔由 fetch_edgar 自動保留 14 天，單次新增產物須 <1MB
      - name: Data size sentinel
        working-directory: projects/us-funnel
        run: |
          echo "--- data size（commit-back 前檢查，新增產物須 <1MB）---"
          du -sh data | tail -1
          du -sh data/* 2>/dev/null || true

      # push paths 過濾不含 data/**，不會自我觸發（commit 訊息刻意不含 skip-ci
      # 方括號字樣——poly-observer 曾因訊息含該字面被 GitHub 跳過觸發）。
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/us-funnel/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: us-funnel data update $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
