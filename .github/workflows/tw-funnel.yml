name: TW Funnel (read-only trust x revenue momentum screener)
on:
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/tw-funnel/*.py'
      - 'projects/tw-funnel/requirements.txt'
      - '.github/workflows/tw-funnel.yml'
  workflow_dispatch:
  schedule:
    # UTC 09:45 = 台北 17:45（投信買賣超每日盤後 ~15:00-16:00 台北公布後）；只在 default branch 生效
    - cron: '45 9 * * 1-5'
    # 每月 10/11 日加掃（月營收公布期；與平日排程重疊時多跑一次無害，管線冪等）
    - cron: '45 9 10,11 * *'

jobs:
  funnel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/tw-funnel/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/tw-funnel/requirements.txt

      # fetch 內部防禦：FinMind 主源、TWSE 次源 fallback（2026-07-10 CI 實跑證實
      # TWSE OpenAPI 對 Actions 海外 IP 全數阻擋）；端點失敗記 endpoint_health、
      # 沿用既有狀態，永遠 exit 0。
      # FINMIND_TOKEN 為可選（免費註冊 600 req/hr）：repo 未設定該 secret 時
      # 展開為空字串 → fetch_data.py 優雅降級為匿名低額度模式（~53 req/日仍夠用）。
      - name: Fetch market data (FinMind primary, TWSE fallback; read-only, defensive)
        working-directory: projects/tw-funnel
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python3 fetch_data.py || true

      # 漏斗：資格關卡 → 否決關卡 → 等權評分 → candidates_latest + meta_latest
      # 狀態為空也產空殼輸出＋誠實降級標註，不 crash
      - name: Run funnel (qualify -> veto -> score)
        working-directory: projects/tw-funnel
        run: python3 funnel.py || true

      # 前瞻表現追蹤：登記新事件＋回填滿窗報酬（1w/1m/3m/6m/12m）
      - name: Track forward performance
        working-directory: projects/tw-funnel
        run: python3 track_performance.py || true

      # repo 體積控制：原始端點回應只留工作區暫存（data/tmp/ 已 .gitignore），
      # 入版控的僅 data/state/ 精簡狀態＋三個輸出 json，總量須 <1MB
      - name: Prune tmp and size sentinel
        working-directory: projects/tw-funnel
        run: |
          rm -rf data/tmp
          echo "--- data size（commit-back 前檢查，CI 產物須 <1MB）---"
          du -sh data | tail -1
          du -sh data/* 2>/dev/null || true

      # paths 過濾已排除 data/**，不會自我觸發（commit 訊息刻意不含 skip-ci 方括號字樣，
      # poly-observer 曾因訊息含該字面被 GitHub 跳過觸發）。
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/tw-funnel/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: tw-funnel data update $(date -u +%F)"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi
