name: Poly Shadow (read-only copy-trade shadow bot)
# 影子跟單觀測：即時盯目標錢包新交易＋當下訂單簿，實測偵測延遲與進場價劣化。
# 純唯讀：shadow_bot.py 只發 GET，不下單、不簽章、無私鑰。
on:
  workflow_dispatch:
    inputs:
      duration_min:
        description: 'Session 長度（分鐘）'
        required: false
        default: '40'
      address:
        description: '目標錢包（留空＝config.TRACKED_WALLETS[0]）'
        required: false
        default: ''
  schedule:
    # 三班抓運動盤活躍時段（UTC）；只在 default branch 生效
    - cron: '0 0 * * *'
    - cron: '0 15 * * *'
    - cron: '30 23 * * *'
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/poly-observer/shadow_bot.py'
      - '.github/workflows/poly-shadow.yml'

# 23:30 班次（40 分鐘）會跨過 00:00 班次的開始時間：排隊而不並行，避免 push 撞車
concurrency:
  group: poly-shadow
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/poly-observer/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/poly-observer/requirements.txt

      # push 觸發＝首跑驗證，只跑 15 分鐘；schedule/dispatch 預設 40 分鐘
      - name: Run shadow bot (read-only, exit 0 by design)
        working-directory: projects/poly-observer
        env:
          EVENT_NAME: ${{ github.event_name }}
          IN_DURATION: ${{ github.event.inputs.duration_min }}
          IN_ADDRESS: ${{ github.event.inputs.address }}
        run: |
          DURATION="$IN_DURATION"
          if [ "$EVENT_NAME" = "push" ]; then DURATION=15; fi
          if [ -z "$DURATION" ]; then DURATION=40; fi
          if [ -n "$IN_ADDRESS" ]; then
            python3 shadow_bot.py --duration-min "$DURATION" --address "$IN_ADDRESS"
          else
            python3 shadow_bot.py --duration-min "$DURATION"
          fi

      # JSONL 體積控制哨兵：40 分鐘 session 約 30KB，遠低於 1MB 上限
      - name: Report shadow data size
        run: du -sh projects/poly-observer/data/shadow || true

      # push 觸發的 paths 過濾不含 data/**，不會自我觸發；
      # 訊息刻意不含 skip-ci 方括號字面（2026-07-10 教訓：含字面會讓後續 CI 被跳過）
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/poly-observer/data/shadow/
          if git diff --cached --quiet; then
            echo "No shadow data to commit."
          else
            git commit -m "auto: poly-shadow session $(date -u +%F)"
            git pull --rebase --autostash || true
            git push
          fi
