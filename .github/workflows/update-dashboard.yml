name: Auto-update Dashboard Data

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 00:00 UTC = 08:00 Taiwan time (weekdays)
  workflow_dispatch:        # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Run dashboard update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        working-directory: projects/avi-v5
        run: python scripts/update_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update dashboard data $(date -u +%Y-%m-%d)"
            git push
          fi
