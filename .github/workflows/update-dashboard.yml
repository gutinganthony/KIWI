name: Auto-update Dashboard Data

on:
  schedule:
    - cron: '0 0 * * *'     # 00:00 UTC = 08:00 台北（每天，含週末刷新日期）
    - cron: '0 22 * * 1-5'  # 22:00 UTC = 06:00 台北（美股收盤後，抓最新收盤）
  workflow_dispatch:        # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Run dashboard update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        working-directory: projects/avi-v5
        run: python scripts/update_dashboard.py

      - name: Fetch Taiwan market data
        working-directory: projects/avi-v5
        run: python scripts/fetch_taiwan.py
        
      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/taiwan_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update dashboard data $(date -u +%Y-%m-%d)"
            git push
          fi
