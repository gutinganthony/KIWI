name: Auto-update Dashboard Data

on:
  schedule:
    # 注意：GitHub cron 經常延遲 30 分鐘～數小時，所以排 3 班互為備援。
    - cron: '0 21 * * 1-5'  # 21:00 UTC = 台北 05:00 次日（美股剛收盤，最早抓到當日收盤）
    - cron: '0 23 * * 1-5'  # 23:00 UTC = 台北 07:00 次日（備援：確保台灣早晨開盤前已更新）
    - cron: '0 2 * * *'     # 02:00 UTC = 台北 10:00（每天，含週末，刷新日期戳）
  workflow_dispatch:        # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Run dashboard update
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        working-directory: projects/avi-v5
        run: python scripts/update_dashboard.py

      - name: Fetch Taiwan market data
        working-directory: projects/avi-v5
        run: python scripts/fetch_taiwan.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/taiwan_data.json docs/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update dashboard data $(date -u +%Y-%m-%d)"
            git push
          fi
