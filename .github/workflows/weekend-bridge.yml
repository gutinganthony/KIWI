name: Weekend Bridge Alert

on:
  schedule:
    # 週六 08:00 TST (00:00 UTC Sat) — 週五美股收盤後隔日檢查
    - cron: '0 0 * * 6'
  workflow_dispatch:

jobs:
  weekend-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: projects/avi-v5/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/avi-v5/requirements.txt

      - name: Update dashboard with Friday close data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        working-directory: projects/avi-v5
        run: python scripts/update_dashboard.py

      - name: Commit updated dashboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto: weekend bridge update $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send weekend alert if stress detected
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python projects/avi-v5/scripts/notify.py --weekend
