name: Poly Observer (read-only smart money tracker)
on:
  push:
    branches: [claude/polymarket-wallet-copy-trade-0l7v2z]
    paths:
      - 'projects/poly-observer/*.py'
      - 'projects/poly-observer/requirements.txt'
      - '.github/workflows/poly-observer.yml'
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'   # 06:30 台北；只在 default branch 生效，合併 main 前不會跑

jobs:
  observe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: projects/poly-observer/requirements.txt

      - name: Install dependencies
        run: pip install -r projects/poly-observer/requirements.txt

      # 暫時性診斷步驟：記錄各候選端點健康度；端點穩定後可移除
      - name: Probe leaderboard endpoints (diagnostic, best-effort)
        working-directory: projects/poly-observer
        run: python3 probe_leaderboard.py || true

      - name: Fetch snapshot (fetch.py 內部防禦，失敗仍落 meta)
        working-directory: projects/poly-observer
        run: python3 fetch.py --max-wallets 60

      - name: Verify smart money
        working-directory: projects/poly-observer
        run: python3 verify_smart_money.py --snapshot "data/snapshots/$(date -u +%F)" || true

      - name: Analyze watchlist
        working-directory: projects/poly-observer
        run: python3 analyze.py --snapshot "data/snapshots/$(date -u +%F)" || true

      # 深度追蹤（唯讀）：對 config.TRACKED_WALLETS 逐一產 dossier ＋跟單成本模擬。
      # track_wallet 會把 tracked 錢包原始 snapshot 複製到 data/tracked/{addr}/latest_raw.json，
      # 故必須在 prune 之前執行；每支 || true 保底，永不擋住後續步驟。
      - name: Track wallets + simulate copy (deep tracking, read-only)
        working-directory: projects/poly-observer
        run: |
          SNAP="data/snapshots/$(date -u +%F)"
          ADDRS=$(python3 -c "import config; print(' '.join(w['address'] for w in config.TRACKED_WALLETS))")
          for addr in $ADDRS; do
            python3 track_wallet.py --address "$addr" --snapshot "$SNAP" || true
            python3 simulate_copy.py --address "$addr" --snapshot "$SNAP" || true
          done

      # repo 體積控制：原始 wallet 快照每日 ~85MB，只保留衍生報告與 meta；
      # 原始資料隨時可由公開 API 重抓，verification json 已含全部逐錢包指標。
      # tracked 錢包的原始資料已由上一步複製到 data/tracked/，不受此 prune 影響。
      - name: Prune raw wallet snapshots
        working-directory: projects/poly-observer
        run: rm -rf data/snapshots/*/wallets

      # paths 過濾已排除 data/**，加上 [skip ci] 雙保險，不會自我觸發
      - name: Commit data back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add projects/poly-observer/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "auto: poly-observer data update $(date -u +%F) [skip ci]"
            git push
          fi

# retrigger note: 2026-07-10 首次觸發因 commit 訊息含 skip-ci 字面被跳過
