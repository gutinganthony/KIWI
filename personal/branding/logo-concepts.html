<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摸魚記 Logo Concepts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f4f0; font-family: 'Georgia', serif; padding: 40px; }
  h1 { font-size: 14px; color: #999; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 48px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; max-width: 960px; }
  .card { background: white; border-radius: 4px; padding: 48px; display: flex; flex-direction: column; align-items: center; gap: 24px; }
  .card.dark { background: #0f1923; }
  .card.navy { background: #1a2744; }
  .label { font-size: 11px; color: #bbb; letter-spacing: 2px; text-transform: uppercase; }
  .card.dark .label, .card.navy .label { color: #555; }
  .divider { width: 100%; height: 1px; background: #eee; margin: 8px 0; }
  .card.dark .divider, .card.navy .divider { background: #1e2d3d; }
  .tagline { font-size: 10px; color: #bbb; letter-spacing: 1.5px; }
</style>
</head>
<body>

<h1>摸魚記 · Logo Concepts</h1>

<div class="grid">

  <!-- Concept A: Fish + Candlestick -->
  <div class="card">
    <div class="label">A · 魚形K線</div>
    <svg width="280" height="100" viewBox="0 0 280 100">
      <!-- Fish made from a rising market line -->
      <!-- Body arc -->
      <path d="M 60 50 Q 110 20 160 50 Q 110 80 60 50" fill="none" stroke="#1a2744" stroke-width="2.5"/>
      <!-- Tail -->
      <path d="M 60 50 L 38 32 M 60 50 L 38 68" stroke="#1a2744" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Eye -->
      <circle cx="148" cy="45" r="3" fill="#c9a84c"/>
      <!-- Divider line -->
      <line x1="178" y1="25" x2="178" y2="75" stroke="#e0ddd8" stroke-width="1"/>
      <!-- Text -->
      <text x="196" y="44" font-family="Georgia, serif" font-size="28" fill="#1a2744" letter-spacing="2">摸魚記</text>
      <text x="197" y="62" font-family="Georgia, serif" font-size="9" fill="#c9a84c" letter-spacing="3">PRIVATE MARKET LETTER</text>
    </svg>
    <div class="tagline">魚身由一條上揚曲線構成，眼睛用金色點綴</div>
  </div>

  <!-- Concept B: Seal / Chop style -->
  <div class="card dark">
    <div class="label">B · 印章風格</div>
    <svg width="180" height="180" viewBox="0 0 180 180">
      <!-- Outer circle -->
      <circle cx="90" cy="90" r="82" fill="none" stroke="#c9a84c" stroke-width="1.5"/>
      <circle cx="90" cy="90" r="76" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="3 3"/>
      <!-- Center text -->
      <text x="90" y="75" text-anchor="middle" font-family="Georgia, serif" font-size="38" fill="#c9a84c" letter-spacing="4">摸魚</text>
      <!-- Thin divider -->
      <line x1="52" y1="88" x2="128" y2="88" stroke="#c9a84c" stroke-width="0.8" opacity="0.5"/>
      <text x="90" y="112" text-anchor="middle" font-family="Georgia, serif" font-size="26" fill="#c9a84c" letter-spacing="6">記</text>
      <!-- Bottom arc text -->
      <path id="bottomArc" d="M 22 90 A 68 68 0 0 0 158 90" fill="none"/>
      <text font-family="Georgia, serif" font-size="8" fill="#c9a84c" letter-spacing="2.5" opacity="0.7">
        <textPath href="#bottomArc" startOffset="12%">PRIVATE  ·  MARKET  ·  LETTER</textPath>
      </text>
    </svg>
    <div class="tagline" style="color:#555">傳統印章感，適合作為頭像或封蠟章</div>
  </div>

  <!-- Concept C: Minimal wordmark -->
  <div class="card navy">
    <div class="label">C · 極簡字標</div>
    <svg width="280" height="90" viewBox="0 0 280 90">
      <!-- Thin top line -->
      <line x1="0" y1="12" x2="280" y2="12" stroke="#c9a84c" stroke-width="0.8"/>
      <!-- Main text -->
      <text x="0" y="58" font-family="Georgia, serif" font-size="44" fill="white" letter-spacing="8">摸魚記</text>
      <!-- Thin bottom line -->
      <line x1="0" y1="70" x2="280" y2="70" stroke="#c9a84c" stroke-width="0.8"/>
      <!-- Subtitle -->
      <text x="2" y="84" font-family="Georgia, serif" font-size="8" fill="#c9a84c" letter-spacing="5">PRIVATE  MARKET  LETTER</text>
    </svg>
    <div class="tagline" style="color:#555">最乾淨，兩條金線是私銀感的來源</div>
  </div>

  <!-- Concept D: Fish icon standalone + wordmark -->
  <div class="card">
    <div class="label">D · 圖標 + 字標組合</div>
    <svg width="260" height="100" viewBox="0 0 260 100">
      <!-- Minimal fish icon -->
      <g transform="translate(0, 8)">
        <!-- Fish body: two curves -->
        <path d="M 10 40 Q 38 12 66 40" fill="none" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M 10 40 Q 38 68 66 40" fill="none" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Tail fork -->
        <path d="M 10 40 L -8 26 M 10 40 L -8 54" stroke="#1a2744" stroke-width="2.2" stroke-linecap="round"/>
        <!-- Eye -->
        <circle cx="58" cy="37" r="2.5" fill="#c9a84c"/>
        <!-- Small upward trend inside body -->
        <path d="M 22 46 L 32 34 L 42 38 L 52 28" fill="none" stroke="#c9a84c" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
      </g>
      <!-- Vertical divider -->
      <line x1="90" y1="15" x2="90" y2="85" stroke="#e8e5e0" stroke-width="1"/>
      <!-- Text block -->
      <text x="108" y="52" font-family="Georgia, serif" font-size="30" fill="#1a2744" letter-spacing="3">摸魚記</text>
      <text x="110" y="68" font-family="Georgia, serif" font-size="7.5" fill="#c9a84c" letter-spacing="3.5">PRIVATE  MARKET  LETTER</text>
    </svg>
    <div class="tagline">魚身內嵌小K線走勢，最有故事感</div>
  </div>

</div>

<!-- Favicon / Avatar version -->
<div style="margin-top: 40px; max-width: 960px;">
  <div style="font-size: 11px; color: #999; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px;">頭像尺寸版本（Substack 圓形頭像）</div>
  <div style="display: flex; gap: 24px; align-items: center;">

    <!-- Avatar A: Seal on dark -->
    <div style="width:100px;height:100px;border-radius:50%;background:#0f1923;display:flex;align-items:center;justify-content:center;overflow:hidden;">
      <svg width="90" height="90" viewBox="0 0 90 90">
        <circle cx="45" cy="45" r="40" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <text x="45" y="38" text-anchor="middle" font-family="Georgia" font-size="18" fill="#c9a84c" letter-spacing="1">摸魚</text>
        <line x1="22" y1="44" x2="68" y2="44" stroke="#c9a84c" stroke-width="0.6" opacity="0.5"/>
        <text x="45" y="60" text-anchor="middle" font-family="Georgia" font-size="14" fill="#c9a84c" letter-spacing="3">記</text>
      </svg>
    </div>

    <!-- Avatar B: Fish icon only -->
    <div style="width:100px;height:100px;border-radius:50%;background:#1a2744;display:flex;align-items:center;justify-content:center;">
      <svg width="64" height="64" viewBox="-10 0 80 64">
        <path d="M 10 32 Q 38 8 66 32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 10 32 Q 38 56 66 32" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M 10 32 L -8 20 M 10 32 L -8 44" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="58" cy="29" r="2.8" fill="#c9a84c"/>
        <path d="M 20 38 L 30 26 L 40 30 L 50 22" fill="none" stroke="#c9a84c" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
      </svg>
    </div>

    <!-- Avatar C: Minimal text -->
    <div style="width:100px;height:100px;border-radius:50%;background:#1a2744;display:flex;align-items:center;justify-content:center;">
      <svg width="80" height="50" viewBox="0 0 80 50">
        <line x1="0" y1="4" x2="80" y2="4" stroke="#c9a84c" stroke-width="0.8"/>
        <text x="40" y="32" text-anchor="middle" font-family="Georgia" font-size="22" fill="white" letter-spacing="3">摸魚記</text>
        <line x1="0" y1="38" x2="80" y2="38" stroke="#c9a84c" stroke-width="0.8"/>
      </svg>
    </div>

    <div style="font-size: 11px; color: #999; line-height: 1.8;">
      左：印章版<br>
      中：魚標誌版（推薦頭像）<br>
      右：文字版
    </div>
  </div>
</div>

</body>
</html>
